[project]
name = "trigger-semi-fungible"
authors = ["Trigger Semi-Fungible Team"]
description = "A dynamic semi-fungible token trigger mechanism on Stacks"
telemetry = false
requirements = []
[contracts.token-transaction-processor]
path = "contracts/token-transaction-processor.clar"
depends_on = []

[contracts.token-analytics-engine]
path = "contracts/token-analytics-engine.clar"
depends_on = []

[contracts.token-trigger-manager]
path = "contracts/token-trigger-manager.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
